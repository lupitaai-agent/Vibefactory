<svg viewBox="0 0 200 275" xmlns="http://www.w3.org/2000/svg">

  <!-- LONG ANTENNAE (extra length, glowing tips) -->
  <path d="M91 59 Q70 38 46 11" stroke="#1A1B1F" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M109 59 Q130 38 154 11" stroke="#1A1B1F" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Glowing antenna tips -->
  <circle cx="46" cy="10" r="4" fill="#CAFF15" stroke="#1A1B1F" stroke-width="1.5"/>
  <circle cx="154" cy="10" r="4" fill="#CAFF15" stroke="#1A1B1F" stroke-width="1.5"/>

  <!-- SHORT ANTENNULES -->
  <path d="M95 61 Q85 50 81 44" stroke="#1A1B1F" stroke-width="1.4" stroke-linecap="round" fill="none"/>
  <path d="M95 61 Q82 52 77 49" stroke="#1A1B1F" stroke-width="1.4" stroke-linecap="round" fill="none"/>
  <path d="M105 61 Q115 50 119 44" stroke="#1A1B1F" stroke-width="1.4" stroke-linecap="round" fill="none"/>
  <path d="M105 61 Q118 52 123 49" stroke="#1A1B1F" stroke-width="1.4" stroke-linecap="round" fill="none"/>

  <!-- EYE STALKS -->
  <path d="M84 65 L77 54 L74 56 L81 67Z" fill="#CAFF15" stroke="#1A1B1F" stroke-width="1.2"/>
  <path d="M116 65 L123 54 L126 56 L119 67Z" fill="#CAFF15" stroke="#1A1B1F" stroke-width="1.2"/>

  <!-- BIG WIDE CURIOUS EYES -->
  <circle cx="75" cy="51" r="11" fill="#CAFF15" stroke="#1A1B1F" stroke-width="2"/>
  <circle cx="125" cy="51" r="11" fill="#CAFF15" stroke="#1A1B1F" stroke-width="2"/>
  <!-- Iris -->
  <circle cx="76" cy="53" r="7" fill="#1A1B1F"/>
  <circle cx="126" cy="53" r="7" fill="#1A1B1F"/>
  <!-- Pupil highlight (bigger, more alive) -->
  <circle cx="73" cy="50" r="2.5" fill="white"/>
  <circle cx="123" cy="50" r="2.5" fill="white"/>
  <!-- Secondary tiny sparkle -->
  <circle cx="79" cy="56" r="1" fill="white"/>
  <circle cx="129" cy="56" r="1" fill="white"/>

  <!-- EYEBROWS — raised high (excited, curious) -->
  <path d="M65 40 Q75 34 85 39" stroke="#1A1B1F" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M115 39 Q125 34 135 40" stroke="#1A1B1F" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- CARAPACE -->
  <ellipse cx="100" cy="97" rx="36" ry="42" fill="#CAFF15" stroke="#1A1B1F" stroke-width="2.2"/>

  <!-- EXCITED OPEN MOUTH (O shape) -->
  <ellipse cx="100" cy="104" rx="10" ry="8" fill="#1A1B1F" stroke="#1A1B1F" stroke-width="1.5"/>
  <ellipse cx="100" cy="104" rx="6" ry="4.5" fill="#CAFF15"/>

  <!-- COMPASS ROSE on chest -->
  <circle cx="100" cy="122" r="12" fill="#CAFF15" stroke="#1A1B1F" stroke-width="1.5"/>
  <line x1="100" y1="110" x2="100" y2="134" stroke="#1A1B1F" stroke-width="1.2"/>
  <line x1="88" y1="122" x2="112" y2="122" stroke="#1A1B1F" stroke-width="1.2"/>
  <!-- N arrow -->
  <path d="M100 111 L97.5 117 L100 115 L102.5 117Z" fill="#1A1B1F"/>
  <!-- Cardinal letters -->
  <circle cx="100" cy="110" r="1.5" fill="#1A1B1F"/>

  <!-- LEFT ARM + CLAW (normal) -->
  <path d="M64 104 Q50 98 38 104 Q50 122 64 116Z" fill="#CAFF15" stroke="#1A1B1F" stroke-width="1.8"/>
  <ellipse cx="24" cy="113" rx="15" ry="12" fill="#CAFF15" stroke="#1A1B1F" stroke-width="2" transform="rotate(-8 24 113)"/>
  <path d="M32 106 Q38 113 32 120" stroke="#1A1B1F" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- RIGHT ARM holding TELESCOPE -->
  <path d="M136 104 Q150 96 162 92" stroke="#1A1B1F" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M136 104 Q150 100 158 96 L162 92 L158 86 L148 90 L136 98Z" fill="#CAFF15" stroke="#1A1B1F" stroke-width="1.8"/>
  <!-- Telescope barrel -->
  <rect x="156" y="68" width="22" height="10" rx="3" fill="#CAFF15" stroke="#1A1B1F" stroke-width="2"
        transform="rotate(-35 156 68)"/>
  <!-- Small telescope extension -->
  <rect x="170" y="52" width="14" height="8" rx="2" fill="#CAFF15" stroke="#1A1B1F" stroke-width="1.5"
        transform="rotate(-35 170 52)"/>
  <!-- Telescope lens circle -->
  <circle cx="183" cy="44" r="6" fill="#CAFF15" stroke="#1A1B1F" stroke-width="2"/>
  <circle cx="183" cy="44" r="2.5" fill="#1A1B1F"/>

  <!-- WALKING LEGS -->
  <path d="M72 118 Q61 131 57 143" stroke="#1A1B1F" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <path d="M75 126 Q64 139 61 153" stroke="#1A1B1F" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <path d="M78 133 Q69 146 67 159" stroke="#1A1B1F" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <path d="M81 138 Q75 151 74 163" stroke="#1A1B1F" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <path d="M128 118 Q139 131 143 143" stroke="#1A1B1F" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <path d="M125 126 Q136 139 139 153" stroke="#1A1B1F" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <path d="M122 133 Q131 146 133 159" stroke="#1A1B1F" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <path d="M119 138 Q125 151 126 163" stroke="#1A1B1F" stroke-width="1.8" stroke-linecap="round" fill="none"/>

  <!-- ABDOMEN SEGMENTS -->
  <path d="M74 139 Q100 132 126 139 Q128 150 126 157 Q100 164 74 157 Q72 150 74 139Z"
        fill="#CAFF15" stroke="#1A1B1F" stroke-width="1.8"/>
  <path d="M77 157 Q100 164 123 157 Q121 169 118 175 Q100 182 82 175 Q79 169 77 157Z"
        fill="#CAFF15" stroke="#1A1B1F" stroke-width="1.6"/>
  <path d="M82 175 Q100 182 118 175 Q116 185 112 191 Q100 196 88 191 Q84 185 82 175Z"
        fill="#CAFF15" stroke="#1A1B1F" stroke-width="1.5"/>
  <path d="M88 191 Q100 196 112 191 Q110 201 106 206 Q100 210 94 206 Q90 201 88 191Z"
        fill="#CAFF15" stroke="#1A1B1F" stroke-width="1.4"/>

  <!-- TELSON FAN -->
  <path d="M84 208 Q68 226 71 244 Q79 250 87 244 Q83 226 90 210Z"
        fill="#CAFF15" stroke="#1A1B1F" stroke-width="1.5"/>
  <path d="M90 210 Q80 230 83 250 Q91 256 97 250 Q97 228 100 213Z"
        fill="#CAFF15" stroke="#1A1B1F" stroke-width="1.5"/>
  <path d="M100 213 Q100 232 100 252 Q106 256 110 250 Q110 228 100 213Z"
        fill="#CAFF15" stroke="#1A1B1F" stroke-width="1.5"/>
  <path d="M100 213 Q103 228 117 250 Q123 256 129 248 Q121 228 110 210Z"
        fill="#CAFF15" stroke="#1A1B1F" stroke-width="1.5"/>
  <path d="M110 210 Q117 226 129 244 Q129 252 116 248 Q113 228 116 208Z"
        fill="#CAFF15" stroke="#1A1B1F" stroke-width="1.5"/>

</svg>
