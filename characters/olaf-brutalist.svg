  <line x1="130" y1="118" x2="145" y2="140" stroke="#1A1B1F" stroke-width="2.2" stroke-linecap="square"/>
  <line x1="127" y1="126" x2="142" y2="149" stroke="#1A1B1F" stroke-width="2.2" stroke-linecap="square"/>
  <line x1="124" y1="133" x2="137" y2="157" stroke="#1A1B1F" stroke-width="2.2" stroke-linecap="square"/>
  <line x1="121" y1="138" x2="130" y2="162" stroke="#1A1B1F" stroke-width="2.2" stroke-linecap="square"/>

