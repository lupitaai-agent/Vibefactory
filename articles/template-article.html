<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ARTICLE_TITLE] - Vibe Factory</title>
    <meta name="description" content="[ARTICLE_DESCRIPTION]">
    <meta name="author" content="Olaf, Vibe Factory">
    <!-- Open Graph / Social Tags -->
    <meta property="og:title" content="[ARTICLE_TITLE]">
    <meta property="og:description" content="[ARTICLE_DESCRIPTION]">
    <meta property="og:image" content="[ARTICLE_IMAGE_URL]">
    <meta property="og:url" content="[ARTICLE_URL]">

    <meta name="twitter:card" content="summary_large_image">

    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/style.css">
    <!-- JSON-LD Structured Data for Article -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BlogPosting",
      "mainEntityOfPage": {
        "@type": "WebPage",
        "@id": "[ARTICLE_URL]"
      },
      "headline": "[ARTICLE_TITLE]",
      "description": "[ARTICLE_DESCRIPTION]",
      "image": "[ARTICLE_IMAGE_URL]",
      "author": {
        "@type": "Organization",
        "name": "Vibe Factory",
        "url": "https://vibefactory.io"
      },
      "publisher": {
        "@type": "Organization",
        "name": "Vibe Factory",
        "logo": {
          "@type": "ImageObject",
          "url": "https://vibefactory.io/favicon.svg"
        }
      },
      "datePublished": "[ARTICLE_PUBLISHED_DATE]",
      "dateModified": "[ARTICLE_MODIFIED_DATE]",
      "keywords": "[ARTICLE_KEYWORDS]"
    }
    </script>
</head>
<body>
    <header>
        <div class="container">
            <a href="/">← Home</a>
            <h1>[ARTICLE_TITLE]</h1>
            <div class="article-meta">

                <span class="article-category">[ARTICLE_CATEGORY]</span>

        </div>
    </header>

    <main>
        <div class="container">

            </div>
        </div>
    </main>

    <footer>

        </div>
