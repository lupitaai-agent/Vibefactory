<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{TITLE}} — Vibefactory</title>
  <meta name="description" content="{{DESCRIPTION}}" />
  <meta name="author" content="{{AUTHOR}}" />
  <link rel="canonical" href="https://vibefactory.io/articles/{{SLUG}}.html" />

  <!-- Open Graph -->
  <meta property="og:title" content="{{TITLE}}" />
  <meta property="og:description" content="{{DESCRIPTION}}" />
  <meta property="og:type" content="article" />
  <meta property="og:url" content="https://vibefactory.io/articles/{{SLUG}}.html" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{TITLE}}" />
  <meta name="twitter:description" content="{{DESCRIPTION}}" />

  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": "{{TITLE}}",
    "description": "{{DESCRIPTION}}",
    "author": {
      "@type": "Person",
      "name": "{{AUTHOR}}"
    },
    "publisher": {
      "@type": "Organization",
      "name": "Vibefactory",
      "url": "https://vibefactory.io"
    },
    "datePublished": "{{DATE}}",
    "mainEntityOfPage": {
      "@type": "WebPage",
      "@id": "https://vibefactory.io/articles/{{SLUG}}.html"
    }
  }
  </script>

  <style>
    /* Base article styles — keep consistent across all articles */
    :root {
      --bg: #0a0a0f;
      --text: #e0e0e0;
      --heading: #ffffff;
      --accent: #00e5a0;
      --accent-dim: rgba(0, 229, 160, 0.1);
      --code-bg: #1a1a2e;
      --border: #1e1e3a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    h1 { color: var(--heading); font-size: 2.2rem; margin: 1rem 0; line-height: 1.2; }
    h2 { color: var(--heading); font-size: 1.5rem; margin: 2.5rem 0 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
    h3 { color: var(--heading); font-size: 1.2rem; margin: 2rem 0 0.75rem; }

    p { margin-bottom: 1.2rem; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .meta { color: #888; font-size: 0.9rem; margin-bottom: 2rem; }
    .category-badge {
      display: inline-block;
      background: var(--accent-dim);
      color: var(--accent);
      padding: 0.25rem 0.75rem;
      border-radius: 4px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--accent);
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    blockquote {
      border-left: 3px solid var(--accent);
      padding: 1rem 1.5rem;
      margin: 1.5rem 0;
      background: var(--accent-dim);
      border-radius: 0 8px 8px 0;
    }

    code {
      background: var(--code-bg);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.9em;
    }

    pre {
      background: var(--code-bg);
      padding: 1.5rem;
      border-radius: 8px;
      overflow-x: auto;
      margin: 1.5rem 0;
    }

    ul, ol { margin: 1rem 0 1.5rem 1.5rem; }
    li { margin-bottom: 0.5rem; }

    .key-takeaway {
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 1.5rem;
      margin: 2rem 0;
    }
  </style>
</head>
<body>
  <a href="/research" class="back-link">← Back to Research</a>

  <span class="category-badge">{{CATEGORY}}</span>
  <h1>{{TITLE}}</h1>
  <p class="meta">By {{AUTHOR}} · {{DATE}} · X min read</p>

  <!-- ═══════════════════════════════════════════════════════════
       ARTICLE CONTENT — Write your article below this line.
       Use h2 for main sections, h3 for subsections.
       Include a .key-takeaway div for the main conclusion.
       ═══════════════════════════════════════════════════════════ -->

  <h2>Introduction</h2>
  <p>Your introduction here. Set up the problem and why it matters.</p>

  <h2>Section Title</h2>
  <p>Your content here.</p>

  <div class="key-takeaway">
    <h3>Key Takeaway</h3>
    <p>Your main conclusion or actionable insight.</p>
  </div>

  <h2>What Comes Next</h2>
  <p>Forward-looking conclusion.</p>
</body>
</html>
